apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fuzeagent-sealed
  namespace: argocd
spec:
  # GitOps-applies the SealedSecrets in deploy/contabo/sealed/ (ghcr-pull image
  # pull secret + the fuzeagent-secrets env secret). The sealed-secrets CONTROLLER
  # that decrypts these is FuzeInfra shared infra (kube-system). Never auto-prune
  # secrets.
  project: fuzeagent
  source:
    repoURL: https://github.com/izzywdev/FuzeAgent.git
    targetRevision: main
    path: deploy/contabo/sealed
  destination:
    server: https://kubernetes.default.svc
    namespace: fuzeagent
  syncPolicy:
    automated:
      prune: false # never auto-prune secrets
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
