apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fuzeagent
  namespace: argocd
spec:
  project: fuzeagent
  source:
    repoURL: https://github.com/izzywdev/FuzeAgent.git
    targetRevision: main
    path: deploy/helm/fuzeagent
    helm:
      valueFiles:
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: fuzeagent
  syncPolicy:
    automated:
      prune: true # stateless app workloads — safe to prune
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
