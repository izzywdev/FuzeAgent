{{- if .Values.serviceAccount.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "fuzeagent.fullname" . }}-orchestrator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fuzeagent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "fuzeagent.fullname" . }}-orchestrator
subjects:
  - kind: ServiceAccount
    name: {{ include "fuzeagent.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
