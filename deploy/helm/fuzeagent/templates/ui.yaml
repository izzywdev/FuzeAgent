{{- if .Values.ui.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  labels:
    {{- include "fuzeagent.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  replicas: {{ .Values.ui.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/part-of: fuzeagent
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: fuzeagent
        app.kubernetes.io/component: ui
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ui
          image: "{{ .Values.ui.image.repository }}:{{ .Values.ui.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          # Static nginx. Its config proxies same-origin /api/orchestrator/* →
          # orchestrator:8000 and /api/hierarchy/* → hierarchy-api:8006 (see
          # services/ui-react/nginx.conf), so the Ingress only routes / → ui.
          ports:
            - name: http
              containerPort: {{ .Values.ui.port }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: ui
  labels:
    {{- include "fuzeagent.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  selector:
    app.kubernetes.io/part-of: fuzeagent
    app.kubernetes.io/component: ui
  ports:
    - name: http
      port: {{ .Values.ui.port }}
      targetPort: http
{{- end }}
