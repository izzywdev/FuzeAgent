{{- if .Values.mcpServer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  labels:
    {{- include "fuzeagent.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-server
spec:
  replicas: {{ .Values.mcpServer.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/part-of: fuzeagent
      app.kubernetes.io/component: mcp-server
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: fuzeagent
        app.kubernetes.io/component: mcp-server
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: mcp-server
          image: "{{ .Values.mcpServer.image.repository }}:{{ .Values.mcpServer.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.mcpServer.port }}
          env:
            - name: FUZEAGENT_API_URL
              value: "http://hierarchy-api:{{ .Values.hierarchyApi.port }}"
            - name: PYTHONUNBUFFERED
              value: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            {{- toYaml .Values.mcpServer.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-server
  labels:
    {{- include "fuzeagent.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-server
spec:
  selector:
    app.kubernetes.io/part-of: fuzeagent
    app.kubernetes.io/component: mcp-server
  ports:
    - name: http
      port: {{ .Values.mcpServer.port }}
      targetPort: http
{{- end }}
