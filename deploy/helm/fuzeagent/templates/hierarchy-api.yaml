{{- if .Values.hierarchyApi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hierarchy-api
  labels:
    {{- include "fuzeagent.labels" . | nindent 4 }}
    app.kubernetes.io/component: hierarchy-api
spec:
  replicas: {{ .Values.hierarchyApi.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/part-of: fuzeagent
      app.kubernetes.io/component: hierarchy-api
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: fuzeagent
        app.kubernetes.io/component: hierarchy-api
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: hierarchy-api
          image: "{{ .Values.hierarchyApi.image.repository }}:{{ .Values.hierarchyApi.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.hierarchyApi.port }}
          env:
            {{- include "fuzeagent.backendEnv" . | nindent 12 }}
            - name: ORCHESTRATOR_URL
              value: "http://orchestrator:{{ .Values.orchestrator.port }}"
          # hierarchy_endpoints.py exposes no /health route → probe the TCP port.
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.hierarchyApi.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: hierarchy-api
  labels:
    {{- include "fuzeagent.labels" . | nindent 4 }}
    app.kubernetes.io/component: hierarchy-api
spec:
  selector:
    app.kubernetes.io/part-of: fuzeagent
    app.kubernetes.io/component: hierarchy-api
  ports:
    - name: http
      port: {{ .Values.hierarchyApi.port }}
      targetPort: http
{{- end }}
