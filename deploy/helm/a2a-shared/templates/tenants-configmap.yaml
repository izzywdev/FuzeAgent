{{- if .Values.a2a.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "a2a.name" . }}-tenants
  labels:
    {{- include "a2a.labels" . | nindent 4 }}
data:
  # Tenant routing table (GitOps source of truth — never live-mutated; schema
  # $defs/tenant). ONLY non-secret DATA is emitted here. Secret-bearing fields —
  # provider.apiKeySecretRef and env[].valueFrom — are deliberately OMITTED: their
  # values live in SealedSecret-provisioned k8s Secrets, and how the shared server
  # binds a per-tenant secret into a session is a server-side detail not fixed by
  # the contract.
  # TODO(server-entrypoint): wire per-tenant provider.apiKeySecretRef / env[] into
  # the container (env or projected volume, keyed by tenant) once the shared
  # server's secret-consumption interface is declared by backend-engineer.
  tenants.yaml: |
    protocolVersion: {{ .Values.a2a.protocolVersion | quote }}
    tenants:
    {{- range .Values.a2a.tenants }}
      - tenant: {{ .tenant | quote }}
        repo: {{ .repo | quote }}
        ref: {{ .ref | default "main" | quote }}
        enabled: {{ .enabled }}
        external: {{ .external | default false }}
        {{- with .entryRole }}
        entryRole: {{ . | quote }}
        {{- end }}
        {{- with .servingRoles }}
        servingRoles:
          {{- range . }}
          - {{ . | quote }}
          {{- end }}
        {{- end }}
        {{- with .provider }}
        provider:
          name: {{ .name | default "anthropic" | quote }}
          {{- with .environmentId }}
          environmentId: {{ . | quote }}
          {{- end }}
          {{- with .vaultIds }}
          vaultIds:
            {{- range . }}
            - {{ . | quote }}
            {{- end }}
          {{- end }}
          {{- with .memoryResources }}
          memoryResources:
            {{- range . }}
            - {{ . | quote }}
            {{- end }}
          {{- end }}
        {{- end }}
    {{- end }}
{{- end }}
