{{- if .Values.a2a.enabled }}
# A2A go-live SealedSecrets — encrypted for fuzeagent/<name> (kubeseal strict scope; only
# this cluster's controller can decrypt). sync-wave "-1" so the controller materialises the
# Secrets before the Deployment (wave 0) mounts them. ghcr-pull already exists in the ns.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  name: a2a-provider-anthropic
  namespace: fuzeagent
spec:
  encryptedData:
    api-key: 
  template:
    metadata:
      name: a2a-provider-anthropic
      namespace: fuzeagent
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  name: a2a-mtls-ca
  namespace: fuzeagent
spec:
  encryptedData:
    ca.crt: 
  template:
    metadata:
      name: a2a-mtls-ca
      namespace: fuzeagent
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  name: a2a-card-signing
  namespace: fuzeagent
spec:
  encryptedData:
    jws.key: 
  template:
    metadata:
      name: a2a-card-signing
      namespace: fuzeagent
{{- end }}
