{{- if .Values.a2a.enabled }}
{{- /*
External surface (opt-in). Each tenant with `external: true` is published on its
own host per card-projection.md §2:
  https://a2a.<repo-slug>.<externalDomain>/rpc
All hosts route to the single `a2a-shared` Service (disambiguated by the `tenant`
body param, not by host). Exec-tier tenants MUST be external:false (card-projection
§5) — enforced by the card generator/contract, not here. Traefik is ClusterIP and
these hosts flow through the Cloudflare tunnel; CF terminates TLS, so no tls block.
*/ -}}
{{- range .Values.a2a.tenants }}
{{- if .external }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: a2a-shared-ext-{{ include "a2a.repoSlug" .repo }}
  labels:
    app.kubernetes.io/name: a2a-shared
    app.kubernetes.io/part-of: fuzeagent
    app.kubernetes.io/component: a2a-server
spec:
  ingressClassName: {{ $.Values.deploy.ingressClassName }}
  rules:
    - host: a2a.{{ include "a2a.repoSlug" .repo }}.{{ $.Values.deploy.externalDomain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: a2a-shared
                port:
                  number: {{ $.Values.a2a.service.port }}
{{- end }}
{{- end }}
{{- end }}
