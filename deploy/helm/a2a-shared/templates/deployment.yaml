{{- if .Values.a2a.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "a2a.name" . }}
  labels:
    {{- include "a2a.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.deploy.replicas }}
  selector:
    matchLabels:
      {{- include "a2a.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "a2a.selectorLabels" . | nindent 8 }}
      annotations:
        # Roll the pod when tenant routing data changes (ConfigMap is not
        # auto-rollout-triggering on its own).
        checksum/tenants: {{ include (print $.Template.BasePath "/tenants-configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.deploy.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ include "a2a.name" . }}
          image: "{{ .Values.a2a.image.repository }}:{{ .Values.a2a.image.tag }}"
          imagePullPolicy: {{ .Values.a2a.image.pullPolicy }}
          # TODO(server-entrypoint): the shared A2A server image (built by
          # backend-engineer under agent-templates/a2a/) owns its own CMD. The
          # contract fixes only the port/paths (binding.md): POST /rpc and
          # GET /.well-known/agent-card.json on this port. If the image expects a
          # different HOST/PORT env contract, adjust the env block below — do not
          # change the Service name (a2a-shared) or port (card-projection.md §2).
          ports:
            - name: http
              containerPort: {{ .Values.a2a.service.port }}
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: {{ .Values.a2a.service.port | quote }}
            - name: PYTHONUNBUFFERED
              value: "1"
            # A2A protocol version served (binding.md §1 — `A2A-Version: 1.0`).
            - name: A2A_PROTOCOL_VERSION
              value: {{ .Values.a2a.protocolVersion | quote }}
            # Tenant routing table (non-secret DATA) — see tenants-configmap.yaml.
            - name: A2A_TENANTS_FILE
              value: /config/tenants.yaml
            {{- with .Values.a2a.auth }}
            # Callee-side identity enforcement (authz.md §2). Caller identity is the
            # validated OIDC subject/claim; NEVER the request body.
            - name: A2A_OIDC_ISSUER_URL
              value: {{ .oidcIssuerUrl | quote }}
            {{- with .audience }}
            - name: A2A_OIDC_AUDIENCE
              value: {{ . | quote }}
            {{- end }}
            - name: A2A_CALLER_CLAIM
              value: {{ .callerClaim | default "sub" | quote }}
            {{- end }}
            {{- with .Values.a2a.cardSigning }}
            # JWS Agent-Card signing key (Fuze profile requires non-empty signatures[]).
            - name: A2A_CARD_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .keySecretRef.name }}
                  key: {{ .keySecretRef.key }}
            {{- with .keyId }}
            - name: A2A_CARD_SIGNING_KID
              value: {{ . | quote }}
            {{- end }}
            {{- end }}
          # TODO(server-entrypoint): no /healthz is fixed by the contract; probe the
          # port until the server declares one. GET /.well-known/agent-card.json
          # (binding.md §1, served unauthenticated) is the natural HTTP readiness
          # target once the server guarantees a 200 there.
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: tenants
              mountPath: /config
              readOnly: true
            {{- if and .Values.a2a.auth .Values.a2a.auth.mtls }}
            {{- if and .Values.a2a.auth.mtls.enabled .Values.a2a.auth.mtls.caSecretRef }}
            - name: mtls-ca
              mountPath: /etc/a2a/mtls
              readOnly: true
            {{- end }}
            {{- end }}
          resources:
            {{- toYaml .Values.deploy.resources | nindent 12 }}
      volumes:
        - name: tenants
          configMap:
            name: {{ include "a2a.name" . }}-tenants
        {{- if and .Values.a2a.auth .Values.a2a.auth.mtls }}
        {{- if and .Values.a2a.auth.mtls.enabled .Values.a2a.auth.mtls.caSecretRef }}
        - name: mtls-ca
          secret:
            secretName: {{ .Values.a2a.auth.mtls.caSecretRef.name }}
            items:
              - key: {{ .Values.a2a.auth.mtls.caSecretRef.key }}
                path: ca.crt
        {{- end }}
        {{- end }}
{{- end }}
