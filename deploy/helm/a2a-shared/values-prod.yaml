# =============================================================================
# Production overlay (Contabo k3s), consumed by the Argo CD `a2a-shared` Application.
#
# ROLLOUT STATE: staged to enabled:true for the FuzeAgent-FIRST bring-up.
# DO NOT MERGE until the go-live checklist in GO-LIVE.md is satisfied:
#   - every REPLACE_ME below is set (oidcIssuerUrl, tenant entryRole),
#   - every referenced SealedSecret exists in the fuzeagent namespace,
#   - and the merge uses a CLEAN squash message (no "[skip ci]" — otherwise
#     release.yml will NOT build/push the fuzeagent-a2a image or bump the tag).
# Until merged, this file is not on main, so Argo continues to render nothing.
#
# The single `tag:` line below is rewritten to the built commit SHA by
# .github/workflows/release.yml on the merge to main — keep it the ONLY `tag:` key.
# All secrets come from SealedSecrets — never inline here.
# =============================================================================
a2a:
  # ROLLOUT: FuzeAgent-first. See GO-LIVE.md. Merge only when secrets + OIDC issuer exist.
  enabled: true

  image:
    repository: ghcr.io/izzywdev/fuzeagent-a2a
    tag: 28777c00781e
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8080

  protocolVersion: "1.0"

  # Identity (authz.md). The family OIDC issuer is FuzeFront's Authentik.
  # Source: FuzeFront deploy/helm/fuzefront/values-prod.yaml (issuerUrl). Prod token `iss`
  # uses the app.fuzefront.com host (Host-forwarding), not the auth.fuzefront.com admin host.
  auth:
    # `iss` claim (public, issuer_mode=global). Keep this string for iss validation, but the
    # A2A OIDC client fetches JWKS/discovery from the IN-CLUSTER Authentik service (below) to
    # avoid a Cloudflare-tunnel hairpin — FuzeFront's decision on FuzeFront#364.
    oidcIssuerUrl: https://app.fuzefront.com/application/o/fuzefront/
    # RESOLVED by FuzeFront#364 — Option 2 (repo-name JWTs, standard validation; NOT introspection):
    #   FuzeFront attaches an Authentik scope mapping to each A2A machine provider emitting
    #   {"repo": "<RepoName>", "aud": "a2a"}. A2A validates the JWT normally and reads `repo`.
    audience: a2a                # dedicated M2M audience (NOT the human `fuzefront` app)
    callerClaim: repo            # custom claim carrying the exact repo name (FuzeAgent, FuzePlan, Exec-cto…)
    # JWKS/discovery override — in-cluster, cross-namespace to the fuzefront ns. The server fetches
    # OIDC discovery + JWKS from HERE (no Cloudflare-tunnel hairpin) while STILL validating the token
    # `iss` claim against oidcIssuerUrl above. Added to the frozen interface in contract v1.1.0
    # (FuzeAgent#96, optional + additive). App slug is `fuzefront` (issuer_mode=global).
    # JWKS is fetched in-cluster via the FuzeFront NetworkPolicy (FuzeFront#373:
    #   networkPolicy.enabled: true in fuzefront prod values, fuzeagentNamespace: fuzeagent),
    # which admits fuzeagent -> authentik-server:9000 cross-namespace.
    oidcDiscoveryUrl: http://authentik-server.fuzefront.svc.cluster.local:9000/application/o/fuzefront/.well-known/openid-configuration
    # ⚠️ STILL DO NOT MERGE: gated on the SealedSecrets existing in the fuzeagent ns and on
    #   decoding a REAL minted token to confirm the exact iss/aud/repo strings + the `fuzefront`
    #   app slug before freezing (GO-LIVE §1b sequence).
    # mTLS is in-cluster defence-in-depth. Set enabled:false to drop the a2a-mtls-ca
    # SealedSecret for a lighter first bring-up (OIDC alone still enforces authz).
    mtls:
      enabled: true
      caSecretRef: { name: a2a-mtls-ca, key: ca.crt }   # SealedSecret

  # JWS Agent-Card signing. Optional per the values-interface schema — comment this
  # whole block out for an unsigned-in-cluster first bring-up (drops a2a-card-signing).
  cardSigning:
    keySecretRef: { name: a2a-card-signing, key: jws.key }   # SealedSecret
    keyId: a2a-v1

  # Tenants: one entry per served agent, added only AFTER that repo's `providesTo`
  # is backfilled (FuzeSDLC#54 graph). FuzeAgent first; FuzePlan + the rest follow.
  tenants:
    - tenant: FuzeAgent
      repo: izzywdev/FuzeAgent
      ref: main
      enabled: true
      # OWNER/devops: FuzeAgent's A2A-serving role key from agent-templates/roles/
      # (the coordinator/entry role that receives an un-skilled SendMessage).
      entryRole: agent-orchestrator
      external: false
      provider:
        name: anthropic
        apiKeySecretRef: { name: a2a-provider-anthropic, key: api-key }   # SealedSecret

deploy:
  replicas: 1
  # Private GHCR pull secret (sealed; name must match the SealedSecret exactly).
  imagePullSecrets:
    - name: ghcr-pull
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { cpu: 500m, memory: 512Mi }
  externalDomain: prod.fuzefront.com
  ingressClassName: traefik
  agentProvider: anthropic
  gitImage: alpine/git:latest
  # FuzeAgent-first bring-up: the only tenant (izzywdev/FuzeAgent) is a PUBLIC repo, so the
  # repo-sync init container clones anonymously — no a2a-repos-git SealedSecret needed. Set this
  # to { name: a2a-repos-git, key: token } (+ seal that secret) ONLY when a PRIVATE tenant repo
  # is onboarded. Keeping the hardened operator secret set to exactly 4 (GO-LIVE §2).
  reposGitTokenSecretRef: null                                         # public tenant → anonymous clone
  providerApiKeySecretRef: { name: a2a-provider-anthropic, key: api-key }
  stateConfigMap: a2a-state                                            # Managed-Agents id-state
