# =============================================================================
# Production overlay (Contabo k3s), consumed by the Argo CD `a2a-shared` Application.
#
# ROLLOUT STATE: staged to enabled:true for the FuzeAgent-FIRST bring-up.
# DO NOT MERGE until the go-live checklist in GO-LIVE.md is satisfied:
#   - every REPLACE_ME below is set (oidcIssuerUrl, tenant entryRole),
#   - every referenced SealedSecret exists in the fuzeagent namespace,
#   - and the merge uses a CLEAN squash message (no "[skip ci]" — otherwise
#     release.yml will NOT build/push the fuzeagent-a2a image or bump the tag).
# Until merged, this file is not on main, so Argo continues to render nothing.
#
# The single `tag:` line below is rewritten to the built commit SHA by
# .github/workflows/release.yml on the merge to main — keep it the ONLY `tag:` key.
# All secrets come from SealedSecrets — never inline here.
# =============================================================================
a2a:
  # ROLLOUT: FuzeAgent-first. See GO-LIVE.md. Merge only when secrets + OIDC issuer exist.
  enabled: true

  image:
    repository: ghcr.io/izzywdev/fuzeagent-a2a
    tag: latest   # release.yml rewrites this to the built SHA on merge to main
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8080

  protocolVersion: "1.0"

  # Identity (authz.md). The family OIDC issuer is FuzeFront's Authentik.
  # Source: FuzeFront deploy/helm/fuzefront/values-prod.yaml (issuerUrl). Prod token `iss`
  # uses the app.fuzefront.com host (Host-forwarding), not the auth.fuzefront.com admin host.
  auth:
    oidcIssuerUrl: https://app.fuzefront.com/application/o/fuzefront/
    # NOTE (confirm with FuzeFront): A2A callers are MACHINE agents. FuzeFront's
    # machine-identity service registers a client_credentials OAuth2 app per machine in
    # Authentik. Two things depend on that and must be settled before this authenticates:
    #   - `audience`: must equal what those machine tokens carry (the Authentik client_id /
    #     configured audience), NOT a literal "a2a" unless a dedicated A2A app is created.
    #   - `callerClaim`: for client_credentials, `sub` is the client_id (a UUID), not the
    #     repo name authz.md expects. Needs a claim that carries the repo name (or the
    #     server introspects, as FuzeFront's machine-identity.ts does) so the caller
    #     resolves to `FuzeAgent`/`FuzePlan`/… . See GO-LIVE.md item 1b.
    audience: fuzefront
    callerClaim: sub
    # mTLS is in-cluster defence-in-depth. Set enabled:false to drop the a2a-mtls-ca
    # SealedSecret for a lighter first bring-up (OIDC alone still enforces authz).
    mtls:
      enabled: true
      caSecretRef: { name: a2a-mtls-ca, key: ca.crt }   # SealedSecret

  # JWS Agent-Card signing. Optional per the values-interface schema — comment this
  # whole block out for an unsigned-in-cluster first bring-up (drops a2a-card-signing).
  cardSigning:
    keySecretRef: { name: a2a-card-signing, key: jws.key }   # SealedSecret
    keyId: a2a-v1

  # Tenants: one entry per served agent, added only AFTER that repo's `providesTo`
  # is backfilled (FuzeSDLC#54 graph). FuzeAgent first; FuzePlan + the rest follow.
  tenants:
    - tenant: FuzeAgent
      repo: izzywdev/FuzeAgent
      ref: main
      enabled: true
      # OWNER/devops: FuzeAgent's A2A-serving role key from agent-templates/roles/
      # (the coordinator/entry role that receives an un-skilled SendMessage).
      entryRole: agent-orchestrator
      external: false
      provider:
        name: anthropic
        apiKeySecretRef: { name: a2a-provider-anthropic, key: api-key }   # SealedSecret

deploy:
  replicas: 1
  # Private GHCR pull secret (sealed; name must match the SealedSecret exactly).
  imagePullSecrets:
    - name: ghcr-pull
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { cpu: 500m, memory: 512Mi }
  externalDomain: prod.fuzefront.com
  ingressClassName: traefik
  agentProvider: anthropic
  gitImage: alpine/git:latest
  # SealedSecret-provisioned at go-live (names must match the sealed resources exactly).
  reposGitTokenSecretRef: { name: a2a-repos-git, key: token }          # private tenant repos
  providerApiKeySecretRef: { name: a2a-provider-anthropic, key: api-key }
  stateConfigMap: a2a-state                                            # Managed-Agents id-state
