name: FuzeAgent Test Suite

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'services/orchestrator/**'
      - 'mcp-servers/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'services/orchestrator/**'
      - 'mcp-servers/**'
      - '.github/workflows/test.yml'

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: ai_context_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y postgresql-client
    
    - name: Install Python dependencies
      working-directory: services/orchestrator
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov faker httpx pytest-xdist
    
    - name: Setup test database
      run: |
        PGPASSWORD=password psql -h localhost -p 5434 -U postgres -d ai_context_test -c "CREATE EXTENSION IF NOT EXISTS vector;"
        PGPASSWORD=password psql -h localhost -p 5434 -U postgres -d ai_context_test -c "CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";"
    
    - name: Run database migrations
      working-directory: services/orchestrator
      env:
        DATABASE_URL: postgresql://postgres:password@localhost:5434/ai_context_test
        TESTING: 1
      run: |
        python -c "
        import asyncio
        from migration_manager import MigrationManager
        
        async def migrate():
            manager = MigrationManager('postgresql://postgres:password@localhost:5434/ai_context_test')
            result = await manager.migrate_up()
            print(f'Applied {result[\"applied_count\"]} migrations')
            await manager.close()
        
        asyncio.run(migrate())
        "
    
    - name: Run unit tests
      working-directory: services/orchestrator
      env:
        DATABASE_URL: postgresql://postgres:password@localhost:5434/ai_context_test
        REDIS_URL: redis://localhost:6380
        ANTHROPIC_API_KEY: test-api-key
        TESTING: 1
      run: |
        python -m pytest tests/ -m "unit" -v --cov=. --cov-report=xml --cov-report=term-missing
    
    - name: Run integration tests
      working-directory: services/orchestrator
      env:
        DATABASE_URL: postgresql://postgres:password@localhost:5434/ai_context_test
        REDIS_URL: redis://localhost:6380
        ANTHROPIC_API_KEY: test-api-key
        TESTING: 1
      run: |
        python -m pytest tests/ -m "integration or api or database" -v --cov=. --cov-append --cov-report=xml --cov-report=term-missing
    
    - name: Run RAG and A2A tests
      working-directory: services/orchestrator
      env:
        DATABASE_URL: postgresql://postgres:password@localhost:5434/ai_context_test
        REDIS_URL: redis://localhost:6380
        ANTHROPIC_API_KEY: test-api-key
        TESTING: 1
      run: |
        python -m pytest tests/ -m "rag or a2a" -v --cov=. --cov-append --cov-report=xml --cov-report=term-missing
    
    - name: Run MCP server tests
      working-directory: services/orchestrator
      env:
        DATABASE_URL: postgresql://postgres:password@localhost:5434/ai_context_test
        REDIS_URL: redis://localhost:6380
        ANTHROPIC_API_KEY: test-api-key
        TESTING: 1
      run: |
        python -m pytest tests/ -m "mcp" -v --cov=. --cov-append --cov-report=xml --cov-report=term-missing
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: services/orchestrator/coverage.xml
        flags: backend
        name: fuzeagent-backend
        fail_ci_if_error: false
    
    - name: Generate coverage report
      working-directory: services/orchestrator
      run: |
        python -m pytest --cov=. --cov-report=html --cov-report=term-missing tests/ || true
    
    - name: Upload coverage HTML report
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report
        path: services/orchestrator/htmlcov/
        retention-days: 30

  security-scan:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install security tools
      run: |
        pip install bandit safety
    
    - name: Run Bandit security scan
      working-directory: services/orchestrator
      run: |
        bandit -r . -f json -o bandit-report.json || true
        bandit -r . -f txt
    
    - name: Check for known security vulnerabilities
      working-directory: services/orchestrator
      run: |
        safety check --json --output safety-report.json || true
        safety check
    
    - name: Upload security reports
      uses: actions/upload-artifact@v3
      with:
        name: security-reports
        path: |
          services/orchestrator/bandit-report.json
          services/orchestrator/safety-report.json
        retention-days: 30

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install linting tools
      run: |
        pip install black isort flake8 mypy
    
    - name: Check code formatting with Black
      working-directory: services/orchestrator
      run: |
        black --check --diff .
    
    - name: Check import sorting with isort
      working-directory: services/orchestrator
      run: |
        isort --check-only --diff .
    
    - name: Run flake8 linting
      working-directory: services/orchestrator
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Run mypy type checking
      working-directory: services/orchestrator
      run: |
        mypy . --ignore-missing-imports --no-strict-optional || true

  docker-build:
    runs-on: ubuntu-latest
    needs: [test, lint]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      working-directory: services/orchestrator
      run: |
        docker build -t fuzeagent-orchestrator:test .
    
    - name: Test Docker image
      run: |
        docker run --rm fuzeagent-orchestrator:test python -c "import main_with_hierarchy; print('Docker image works!')"

  performance-test:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: ai_context_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      working-directory: services/orchestrator
      run: |
        pip install -r requirements.txt
        pip install pytest pytest-benchmark
    
    - name: Run performance tests
      working-directory: services/orchestrator
      env:
        DATABASE_URL: postgresql://postgres:password@localhost:5434/ai_context_test
        REDIS_URL: redis://localhost:6380
        TESTING: 1
      run: |
        python -m pytest tests/ -m "not slow" --benchmark-only --benchmark-json=benchmark.json || true
    
    - name: Upload benchmark results
      uses: actions/upload-artifact@v3
      with:
        name: benchmark-results
        path: services/orchestrator/benchmark.json
        retention-days: 30