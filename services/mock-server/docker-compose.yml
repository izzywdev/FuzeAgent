version: '3.8'

services:
  mock-server:
    build: .
    ports:
      - "8001:8000"
    volumes:
      - mock_data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/mock_data.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  mock_data:
    driver: local
