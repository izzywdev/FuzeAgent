services:
  # Mock API Server (Python with PostgreSQL)
  mock-server:
    build: ./services/mock-server
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://ariWeinberg:ariWeinberg@172.17.0.2:5432/ariWeinberg
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - mock-ui-network

  # UI (React) - Development Mode
  ui:
    build: 
      context: ./services/ui-react
      dockerfile: Dockerfile
      target: development
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - REACT_APP_API_URL=http://localhost:8001
    volumes:
      # Mount source code for live development and hot reload
      - ./services/ui-react/src:/app/src
      - ./services/ui-react/public:/app/public
      - ./services/ui-react/index.html:/app/index.html
      - ./services/ui-react/vite.config.ts:/app/vite.config.ts
      - ./services/ui-react/package.json:/app/package.json
      - ./services/ui-react/tailwind.config.js:/app/tailwind.config.js
      - ./services/ui-react/postcss.config.js:/app/postcss.config.js
      - ./services/ui-react/tsconfig.json:/app/tsconfig.json
      - ./services/ui-react/tsconfig.app.json:/app/tsconfig.app.json
      - ./services/ui-react/eslint.config.js:/app/eslint.config.js
    working_dir: /app
    command: ["npm", "start"]
    depends_on:
      - mock-server
    networks:
      - mock-ui-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  mock-ui-network:
    driver: bridge
