services:
  # Database for Backend
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ai_context
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/backend/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - fuze-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API Service (FastAPI with PostgreSQL)
  backend:
    build: ./services/backend
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/fuzeagent
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fuze-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # UI (React)
  ui:
    build: ./services/ui-react
    ports:
      - "3031:3000"
    environment:
      - NODE_ENV=development
      - REACT_APP_API_URL=http://localhost:8002
      - VITE_BACKEND_API_URL=http://localhost:8002
    volumes:
      # Mount source code for live development and hot reload
      - ./services/ui-react/src:/app/src
      - ./services/ui-react/public:/app/public
      - ./services/ui-react/index.html:/app/index.html
      - ./services/ui-react/vite.config.ts:/app/vite.config.ts
      - ./services/ui-react/package.json:/app/package.json
      - ./services/ui-react/tailwind.config.js:/app/tailwind.config.js
      - ./services/ui-react/postcss.config.js:/app/postcss.config.js
      - ./services/ui-react/tsconfig.json:/app/tsconfig.json
      - ./services/ui-react/tsconfig.app.json:/app/tsconfig.app.json
      - ./services/ui-react/eslint.config.js:/app/eslint.config.js
    working_dir: /app
    command: ["npm", "start"]
    depends_on:
      - backend
    networks:
      - fuze-network

networks:
  fuze-network:
    driver: bridge

volumes:
  postgres_data:
