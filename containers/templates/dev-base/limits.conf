# Resource limits for agent user
# Format: <domain>      <type>  <item>         <value>

# CPU limits (in seconds per day)
agent           hard    cpu            14400   # 4 hours of CPU time per day
agent           soft    cpu            7200    # 2 hours soft limit

# Memory limits
agent           hard    as             2097152 # 2GB virtual memory (in KB)
agent           soft    as             1572864 # 1.5GB soft limit (in KB)

# Process limits
agent           hard    nproc          1024    # Maximum number of processes
agent           soft    nproc          512     # Soft limit for processes

# File descriptor limits
agent           hard    nofile         8192    # Maximum open files
agent           soft    nofile         4096    # Soft limit for open files

# File size limits (in KB)
agent           hard    fsize          1048576 # 1GB maximum file size
agent           soft    fsize          524288  # 512MB soft limit

# Core dump limits
agent           hard    core           0       # No core dumps
agent           soft    core           0       # No core dumps