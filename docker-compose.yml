version: '3.9'

services:
  # Message Queue
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - ai-team-network

  # Database for Context Storage and Backend
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ai_context
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/backend/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - ai-team-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for Caching
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - ai-team-network

  # Orchestration Service with Autonomous Execution
  orchestrator:
    build: ./services/orchestrator
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/ai_context
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://admin:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      # Autonomous execution configuration
      ENABLE_AUTONOMOUS_EXECUTION: "true"
      ENABLE_MULTI_AGENT_COORDINATION: "true"
      ENABLE_FILE_OPERATIONS: "true"
      ENABLE_MCP_INTEGRATION: "true"
      # Security and encryption
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      # Claude SDK configuration
      CLAUDE_CLI_PATH: "/usr/local/bin/claude"
      # Sandbox configuration
      DOCKER_HOST: "unix:///var/run/docker.sock"
      # Resource limits
      MAX_CONCURRENT_EXECUTIONS: "10"
      MAX_COORDINATION_SESSIONS: "5"
    user: root
    entrypoint: ""
    command: bash -c "cd /app && uvicorn main_with_hierarchy:app --host 0.0.0.0 --port 8000"
    volumes:
      - orchestrator_workspaces:/app/workspaces
      - orchestrator_backups:/app/.fuzeagent/backups
      # Docker socket mounting disabled due to Windows/WSL compatibility issues
      # - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - ai-team-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Hierarchy API Service (Organizations and Teams)
  hierarchy-api:
    build:
      context: .
      dockerfile: Dockerfile.hierarchy
    ports:
      - "8006:8006"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/ai_context
      ORCHESTRATOR_URL: http://orchestrator:8000
    depends_on:
      - postgres
      - orchestrator
    networks:
      - ai-team-network

  # Backend API Service (FastAPI with PostgreSQL)
  backend:
    build: ./services/backend
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/fuzeagent
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ai-team-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Mock API Server (Python with PostgreSQL)
  mock-server:
    build: ./services/mock-server
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://ariWeinberg:ariWeinberg@172.17.0.2:5432/ariWeinberg
    networks:
      - ai-team-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # UI (React)
  ui:
    build: ./services/ui-react
    ports:
      - "3031:3000"
    environment:
      - NODE_ENV=development
      - REACT_APP_API_URL=http://localhost:8001
    volumes:
      # Mount source code for live development and hot reload
      - ./services/ui-react/src:/app/src
      - ./services/ui-react/public:/app/public
      - ./services/ui-react/index.html:/app/index.html
      - ./services/ui-react/vite.config.ts:/app/vite.config.ts
      - ./services/ui-react/package.json:/app/package.json
      - ./services/ui-react/tailwind.config.js:/app/tailwind.config.js
      - ./services/ui-react/postcss.config.js:/app/postcss.config.js
      - ./services/ui-react/tsconfig.json:/app/tsconfig.json
      - ./services/ui-react/tsconfig.app.json:/app/tsconfig.app.json
      - ./services/ui-react/eslint.config.js:/app/eslint.config.js
    working_dir: /app
    command: ["npm", "start"]
    depends_on:
      - mock-server
    networks:
      - ai-team-network

  # MCP Server for Claude Code Integration (SSE Mode)
  mcp-server:
    build: ./mcp-servers/fuzeagent-server
    command: ["python", "server.py", "--transport", "sse", "--host", "0.0.0.0", "--port", "8003"]
    ports:
      - "8003:8003"
    environment:
      FUZEAGENT_API_URL: http://hierarchy-api:8006
      PYTHONUNBUFFERED: 1
    depends_on:
      - hierarchy-api
      - orchestrator
    networks:
      - ai-team-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  ai-team-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  orchestrator_workspaces:
  orchestrator_backups:
  mock_data: