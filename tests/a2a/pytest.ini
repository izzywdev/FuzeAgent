# Independent A2A contract/acceptance test suite (test-engineer slice).
# Self-contained pytest config so `pytest tests/a2a` runs without the
# services/orchestrator app harness.
[pytest]
testpaths = .
python_files = test_*.py
markers =
    a2a: A2A protocol contract/acceptance/integration tests.
    conformance: Static conformance vs the FROZEN contract artifacts (schemas, cards, fixtures, client). Expected GREEN per-PR (no server needed).
    integration: Requires a LIVE A2A server (env A2A_SERVER_BASE_URL).
    live: Phase-3 rollout acceptance gate — runs vs a DEPLOYED A2A server via a2a-acceptance.yml (workflow_dispatch/workflow_call), NOT per-PR. Tracked in #90.
    acceptance: The motivating cross-product acceptance scenario.
    authz: Authorization-model tests (callee-enforced allowlist).
addopts = -ra
