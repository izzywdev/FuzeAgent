# Runner for the INDEPENDENT A2A contract/acceptance suite (test-engineer slice).
# Scoped ONLY to tests/a2a — it does not touch product build/deploy pipelines.
# devops-engineer may fold this into the main test matrix; kept standalone so the
# honest grader has a visible check without coupling to services/orchestrator.
name: A2A Contract Tests

on:
  push:
    branches: [ main, develop, "feat/a2a-tests" ]
    paths:
      - "tests/a2a/**"
      - "agent-templates/contracts/a2a/**"
      - ".github/workflows/a2a-contract-tests.yml"
  pull_request:
    paths:
      - "tests/a2a/**"
      - "agent-templates/contracts/a2a/**"
      - ".github/workflows/a2a-contract-tests.yml"

jobs:
  conformance:
    # Static conformance vs the FROZEN contract. Expected GREEN.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install suite deps
        run: pip install -r tests/a2a/requirements-a2a-tests.txt
      - name: Run conformance suite
        working-directory: tests/a2a
        run: python -m pytest -m conformance -v

  live-integration:
    # Behavioural conformance/acceptance/authZ vs a LIVE A2A server.
    # EXPECTED RED until backend-engineer's server slice is delivered and
    # A2A_SERVER_BASE_URL (+ test credentials) are wired. A red check here is the
    # honest signal that the server is not yet verified — not a broken pipeline.
    runs-on: ubuntu-latest
    env:
      A2A_SERVER_BASE_URL: ${{ vars.A2A_SERVER_BASE_URL }}
      A2A_TEST_OIDC_TOKEN: ${{ secrets.A2A_TEST_OIDC_TOKEN }}
      A2A_TEST_UNAUTH_TOKEN: ${{ secrets.A2A_TEST_UNAUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install suite deps
        run: pip install -r tests/a2a/requirements-a2a-tests.txt
      - name: Run live integration/acceptance/authZ suite
        working-directory: tests/a2a
        run: python -m pytest -m integration -v
