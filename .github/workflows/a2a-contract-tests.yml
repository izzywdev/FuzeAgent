# Per-PR runner for the INDEPENDENT A2A CONFORMANCE suite (test-engineer slice).
# Scoped ONLY to tests/a2a and to the conformance tier, which grades the FROZEN
# contract and needs NO running server — so it must stay GREEN on every PR.
#
# The live acceptance / authZ-negative / state-machine tier is NOT run here: it
# needs a deployed A2A server, which does not exist per-PR. It is the Phase-3
# rollout gate in a2a-acceptance.yml (workflow_dispatch/workflow_call), #90.
# devops-engineer may fold this conformance job into the main test matrix.
name: A2A Contract Tests

on:
  push:
    branches: [ main, develop, "feat/a2a-tests" ]
    paths:
      - "tests/a2a/**"
      - "agent-templates/contracts/a2a/**"
      - ".github/workflows/a2a-contract-tests.yml"
  pull_request:
    paths:
      - "tests/a2a/**"
      - "agent-templates/contracts/a2a/**"
      - ".github/workflows/a2a-contract-tests.yml"

jobs:
  conformance:
    # Static conformance vs the FROZEN contract. Expected GREEN. No server needed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"
      - name: Install suite deps
        run: pip install -r tests/a2a/requirements-a2a-tests.txt
      - name: Run conformance suite (contract-only, no live server)
        working-directory: tests/a2a
        run: python -m pytest -m conformance -v
