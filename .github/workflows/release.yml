name: Release (images + GitOps bump)

# On push to main: build the four service images, push to GHCR tagged with the
# commit SHA, then bump the four image tags in values-prod.yaml and commit.
# Argo CD (run by FuzeInfra) sees the git change and rolls out the new images.
on:
  push:
    branches: [main]
    paths:
      - 'services/orchestrator/**'
      - 'services/ui-react/**'
      - 'mcp-servers/fuzeagent-server/**'
      - 'Dockerfile.hierarchy'
      - 'hierarchy_endpoints.py'
      - 'requirements-hierarchy.txt'
      - 'deploy/helm/fuzeagent/**'
      - 'deploy/helm/a2a-shared/**'
      - 'agent-templates/a2a/**'
      - 'agent-templates/contracts/a2a/**'
      - 'containers/**'
      - '.github/workflows/release.yml'

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-and-bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write # commit the tag bump
      packages: write # push to GHCR
      pull-requests: write # open the gitops bump PR
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: tag
        run: echo "sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Build & push orchestrator
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: services/orchestrator
          file: services/orchestrator/Dockerfile
          push: true
          tags: |
            ghcr.io/izzywdev/fuzeagent-orchestrator:${{ steps.tag.outputs.sha }}
            ghcr.io/izzywdev/fuzeagent-orchestrator:latest
          cache-from: type=gha,scope=orchestrator
          cache-to: type=gha,mode=max,scope=orchestrator

      - name: Build & push hierarchy-api
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: Dockerfile.hierarchy
          push: true
          tags: |
            ghcr.io/izzywdev/fuzeagent-hierarchy-api:${{ steps.tag.outputs.sha }}
            ghcr.io/izzywdev/fuzeagent-hierarchy-api:latest
          cache-from: type=gha,scope=hierarchy
          cache-to: type=gha,mode=max,scope=hierarchy

      - name: Build & push ui
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: services/ui-react
          file: services/ui-react/Dockerfile
          push: true
          # No VITE_API_URL build-arg: config/api.ts derives the API base from
          # window.location.origin in production, and the UI's own nginx proxies
          # same-origin /api/orchestrator + /api/hierarchy to the backends.
          tags: |
            ghcr.io/izzywdev/fuzeagent-ui:${{ steps.tag.outputs.sha }}
            ghcr.io/izzywdev/fuzeagent-ui:latest
          cache-from: type=gha,scope=ui
          cache-to: type=gha,mode=max,scope=ui

      - name: Build & push mcp-server
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: mcp-servers/fuzeagent-server
          file: mcp-servers/fuzeagent-server/Dockerfile
          push: true
          tags: |
            ghcr.io/izzywdev/fuzeagent-mcp-server:${{ steps.tag.outputs.sha }}
            ghcr.io/izzywdev/fuzeagent-mcp-server:latest
          cache-from: type=gha,scope=mcp
          cache-to: type=gha,mode=max,scope=mcp

      - name: Build & push a2a-shared
        # The ONE shared A2A server. Context = agent-templates/ (mirrors handoff_mcp);
        # packages a2a/*.py + the frozen contract client. Chart ships enabled:false
        # until the server + providesTo backfill land, so this image is tagged but
        # not run in prod yet.
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: agent-templates
          file: agent-templates/a2a/Dockerfile
          push: true
          tags: |
            ghcr.io/izzywdev/fuzeagent-a2a:${{ steps.tag.outputs.sha }}
            ghcr.io/izzywdev/fuzeagent-a2a:latest
          cache-from: type=gha,scope=a2a
          cache-to: type=gha,mode=max,scope=a2a

      - name: Bump image tags in values-prod.yaml (GitOps)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ steps.tag.outputs.sha }}"
          BRANCH="release/gitops-bump-${SHA}"
          # Rewrites the four app-image `tag:` lines. Datastore images are single
          # `image:` strings (no tag: key), so they are untouched.
          sed -i -E "s/^(\s*tag:).*/\1 ${SHA}/" deploy/helm/fuzeagent/values-prod.yaml
          # a2a-shared overlay has exactly one `tag:` key (the a2a image) — same rewrite.
          sed -i -E "s/^(\s*tag:).*/\1 ${SHA}/" deploy/helm/a2a-shared/values-prod.yaml
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout -b "${BRANCH}"
          git add deploy/helm/fuzeagent/values-prod.yaml deploy/helm/a2a-shared/values-prod.yaml
          git commit -m "release: fuzeagent images ${SHA} [skip ci]" || exit 0
          git push origin "${BRANCH}"
          # Bot (GITHUB_TOKEN) creates PR; owner (GH_APPROVE_TOKEN) approves then admin-merges
          # GitHub blocks self-approval: same user cannot create AND approve a PR
          # --admin bypasses required gate checks ([skip ci] means they never run anyway)
          PR_URL=$(gh pr create \
            --title "release: fuzeagent images ${SHA}" \
            --body "Automated GitOps image-tag bump. Images built from CI-tested code." \
            --base main --head "${BRANCH}")
          GH_TOKEN="${{ secrets.GH_APPROVE_TOKEN }}" gh pr review "${PR_URL}" --approve -b "Automated GitOps release"
          GH_TOKEN="${{ secrets.GH_APPROVE_TOKEN }}" gh pr merge "${PR_URL}" --admin --squash --delete-branch

  # ---------------------------------------------------------------------------
  # claude-runner image library (Track 4)
  # Base image must finish before variants — they all FROM it.
  # BuildKit secret mount ensures the GitHub Packages token is NEVER baked into
  # any image layer or metadata.
  # ---------------------------------------------------------------------------
  build-agent-images-base:
    name: Build claude-runner-base image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push claude-runner-base
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: containers/claude-runner-base
          push: true
          # BuildKit secret mount — token never stored in image layer or metadata
          secrets: |
            npm_token=${{ secrets.GITHUB_TOKEN }}
          tags: |
            ghcr.io/izzywdev/fuzeagent/claude-runner-base:latest
            ghcr.io/izzywdev/fuzeagent/claude-runner-base:${{ github.sha }}
          cache-from: type=gha,scope=claude-runner-base
          cache-to: type=gha,mode=max,scope=claude-runner-base

  build-agent-images-variants:
    name: Build claude-runner variant images
    runs-on: ubuntu-latest
    needs: build-agent-images-base
    if: github.ref == 'refs/heads/main'
    permissions:
      packages: write
    strategy:
      matrix:
        image:
          - name: claude-runner-python-dev
            context: containers/claude-runner-python-dev
          - name: claude-runner-react-dev
            context: containers/claude-runner-react-dev
          - name: claude-runner-qa
            context: containers/claude-runner-qa
          - name: claude-runner-marketer
            context: containers/claude-runner-marketer
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ${{ matrix.image.name }}
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: ${{ matrix.image.context }}
          push: true
          tags: |
            ghcr.io/izzywdev/fuzeagent/${{ matrix.image.name }}:latest
            ghcr.io/izzywdev/fuzeagent/${{ matrix.image.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}
