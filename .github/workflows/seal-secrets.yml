name: Seal prod secrets

# Manually-triggered, idempotent, credential-free sealing. FuzeInfra holds the
# private (decrypt) key; we only fetch the published PUBLIC cert and seal offline.
# Plaintext never touches git. Committed ciphertext under deploy/contabo/sealed/
# is reconciled onto the cluster by the `fuzeagent-sealed` Argo application.
#
# - Generated creds (POSTGRES/RABBITMQ/JWT/ENCRYPTION) are sealed ONCE (skipped if
#   the file already exists) so re-runs don't rotate a live DB password.
# - 3rd-party API keys (from repo Actions secrets) are MERGED in on every run, so
#   you can add/update them later without disturbing the generated creds.
# - To rotate everything: delete deploy/contabo/sealed/fuzeagent-secrets.yaml and re-run.
on:
  workflow_dispatch:

concurrency:
  group: seal-secrets
  cancel-in-progress: false

env:
  NS: fuzeagent
  SEALED_DIR: deploy/contabo/sealed
  CERT_URL: https://sealed-secrets.prod.fuzefront.com/v1/cert.pem
  KUBESEAL_VERSION: "0.27.1"

jobs:
  seal:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl + kubeseal
        run: |
          curl -fsSLo kubectl "https://dl.k8s.io/release/$(curl -fsSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install kubectl /usr/local/bin/kubectl
          curl -fsSLo ks.tar.gz "https://github.com/bitnami-labs/sealed-secrets/releases/download/v${KUBESEAL_VERSION}/kubeseal-${KUBESEAL_VERSION}-linux-amd64.tar.gz"
          tar -xzf ks.tar.gz kubeseal
          sudo install kubeseal /usr/local/bin/kubeseal

      - name: Fetch public cert
        run: curl -fsSL "$CERT_URL" -o /tmp/pub.pem

      - name: Seal generated app secrets (once) + merge API keys
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "$SEALED_DIR"
          F="$SEALED_DIR/fuzeagent-secrets.yaml"
          if [ ! -f "$F" ]; then
            echo "Generating fresh fuzeagent-secrets…"
            # Alphanumeric-only generated passwords (a shell metachar in a URL-
            # embedded password breaks init containers). ENCRYPTION_KEY is a Fernet
            # urlsafe-base64 key (consumed only by the app, so -_/= are fine).
            PG=$(openssl rand -hex 24)
            RMQ=$(openssl rand -hex 24)
            JWT=$(openssl rand -hex 32)
            ENC=$(openssl rand -base64 32 | tr '+/' '-_')
            kubectl create secret generic fuzeagent-secrets -n "$NS" \
              --from-literal=POSTGRES_PASSWORD="$PG" \
              --from-literal=RABBITMQ_PASSWORD="$RMQ" \
              --from-literal=JWT_SECRET="$JWT" \
              --from-literal=ENCRYPTION_KEY="$ENC" \
              --from-literal=ANTHROPIC_API_KEY="${ANTHROPIC_API_KEY:-}" \
              --from-literal=OPENAI_API_KEY="${OPENAI_API_KEY:-}" \
              --from-literal=GOOGLE_API_KEY="${GOOGLE_API_KEY:-}" \
              --dry-run=client -o yaml \
              | kubeseal --cert /tmp/pub.pem -o yaml > "$F"
            echo "Created $F"
          else
            echo "$F exists — preserving generated creds; merging non-empty API keys."
            for K in ANTHROPIC_API_KEY OPENAI_API_KEY GOOGLE_API_KEY; do
              V="${!K:-}"
              if [ -n "$V" ]; then
                kubectl create secret generic fuzeagent-secrets -n "$NS" \
                  --from-literal="$K=$V" --dry-run=client -o yaml \
                  | kubeseal --cert /tmp/pub.pem --merge-into "$F"
                echo "merged $K"
              fi
            done
          fi

      - name: Seal GHCR image-pull secret (once)
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          set -euo pipefail
          F="$SEALED_DIR/ghcr-pull.yaml"
          if [ -z "${GHCR_PAT:-}" ]; then
            echo "GHCR_PAT not set — skipping ghcr-pull (set it and re-run)."; exit 0
          fi
          if [ -f "$F" ]; then echo "$F exists — skipping."; exit 0; fi
          # Name MUST match imagePullSecrets in values-prod.yaml (ghcr-pull).
          kubectl create secret docker-registry ghcr-pull -n "$NS" \
            --docker-server=ghcr.io --docker-username=izzywdev --docker-password="$GHCR_PAT" \
            --dry-run=client -o yaml \
            | kubeseal --cert /tmp/pub.pem -o yaml > "$F"
          echo "Created $F"

      - name: Commit sealed files
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add "$SEALED_DIR"
          git commit -m "chore(secrets): seal prod secrets [skip ci]" || { echo "nothing to commit"; exit 0; }
          git push
