name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./services/ui-react
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: ./services/ui-react/package-lock.json
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run linting
      run: npm run lint
      
    - name: Type checking
      run: npm run type-check
      
    - name: Build application
      run: npm run build
      
    - name: Run tests
      run: npm run test:run
      
    - name: Run tests with coverage
      run: npm run test:coverage
      
    - name: Upload frontend coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./services/ui-react/coverage/coverage-summary.json
        flags: frontend
        name: fuzeagent-frontend
        fail_ci_if_error: false

  lint-and-test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./services/orchestrator
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 black isort mypy pytest pytest-cov
        
    - name: Code formatting check (Black)
      run: black --check .
      
    - name: Import sorting check (isort)
      run: isort --check-only .
      
    - name: Linting (flake8)
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      
    - name: Type checking (mypy)
      run: mypy . --ignore-missing-imports
      continue-on-error: true
      
    - name: Run tests
      run: pytest --cov=. --cov-report=xml
      continue-on-error: true

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        
    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  docker-security:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Build Docker images
      run: |
        docker build -t fuzeagent-orchestrator:latest ./services/orchestrator
        docker build -t fuzeagent-ui:latest ./services/ui-react
        
    - name: Run Trivy on Docker images
      run: |
        docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
          -v ${{ github.workspace }}:/workspace \
          aquasec/trivy:latest image fuzeagent-orchestrator:latest
        docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
          -v ${{ github.workspace }}:/workspace \
          aquasec/trivy:latest image fuzeagent-ui:latest
      continue-on-error: true

  dependency-check:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js for frontend dependency check
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Frontend dependency audit
      run: |
        cd services/ui-react
        npm audit --audit-level=high
      continue-on-error: true
      
    - name: Setup Python for backend dependency check
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Backend dependency security check
      run: |
        cd services/orchestrator
        pip install --upgrade pip
        pip install safety
        safety check -r requirements.txt
      continue-on-error: true