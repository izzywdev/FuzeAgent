# Phase-3 A2A ACCEPTANCE GATE (tracked in #90).
#
# This is the relocation of the live tier out of per-PR CI to where its dependency
# — a REACHABLE A2A server — actually exists. It runs ONLY the live tests
# (selected by `pytest -m live`):
#   * live wire conformance vs the deployed server
#   * authZ-negative (non-allowlisted caller refused BY THE CALLEE)
#   * state-machine (always_ask / reach_human / cancel / subscribe)
#   * cross-product acceptance (caller with no Jira skill/MCP -> FuzePlan)
#
# It NEVER triggers on pull_request/push — only on manual dispatch or when a Phase-3
# rollout pipeline calls it (workflow_call). A2A_REQUIRE_LIVE=1 makes the suite FAIL
# LOUDLY (never skip) if the server is unreachable or misbehaves.
#
# DEVOPS STAND-UP (this file): the job boots the REAL shared A2A server
# (`python -m a2a.runtime`) from source, backed by a self-contained echo provider
# (AGENT_PROVIDER=echo, agent-templates/providers/echo) so a task completes with NO
# external agent backend, fronting the FuzePlan tenant projection. Callee-enforced
# authZ is exercised with an ephemeral in-job OIDC identity: gen_test_identity.py
# mints an RSA keypair + JWKS (served by jwks_server.py at the issuer's
# /protocol/openid-connect/certs path) and two JWTs — one caller IN the FuzePlan
# providesTo allowlist, one NOT. No secrets stored; tokens are base64url text.
#
# The card projects its JSON-RPC interface URL as the in-cluster DNS name
# (card_generator.IN_CLUSTER_URL). The typed client dials exactly that URL, so we map
# it to the loopback server via /etc/hosts — the card is served unmodified.
name: A2A Phase-3 Acceptance Gate

on:
  workflow_dispatch: {}
  workflow_call: {}

env:
  # Enforcement flag: the library-level skipif is disabled, so a missing
  # server/token surfaces as a FAILURE, not a skip.
  A2A_REQUIRE_LIVE: "1"
  # The card's projected interface host (card_generator.IN_CLUSTER_URL). We point it
  # at the loopback server via /etc/hosts and drive the suite through it.
  A2A_SERVER_HOST: a2a-shared.fuzeagent.svc.cluster.local
  A2A_SERVER_PORT: "8080"
  # A tenant that is NOT configured on the server, so the absent-allowlist test hits
  # the fail-closed path (unconfigured callee denies every caller).
  A2A_NO_ALLOWLIST_TENANT: FuzeNoAllowlist
  # Ephemeral OIDC issuer (served in-job by jwks_server.py).
  A2A_TEST_ISSUER: http://127.0.0.1:9099
  A2A_TEST_AUDIENCE: fuze-a2a-acceptance

jobs:
  phase3-acceptance:
    name: Phase-3 acceptance gate (live A2A server)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"

      - name: Install server + suite deps
        run: |
          python -m pip install --upgrade pip
          pip install -r agent-templates/a2a/requirements.txt
          pip install -r tests/a2a/requirements-a2a-tests.txt

      - name: Stage the FuzePlan tenant projection (repo checkout the resolver reads)
        run: |
          mkdir -p "$RUNNER_TEMP/repos"
          # LocalRepoResolver reads <A2A_REPOS_DIR>/<repo-name>; repo izzywdev/FuzePlan
          # -> FuzePlan. The projection inputs (.fuze/manifest.json + roles) are the
          # canonical FuzePlan fixture (providesTo allowlist + product-manager skill).
          cp -r agent-templates/a2a/tests/fixtures/fuzeplan "$RUNNER_TEMP/repos/FuzePlan"

      - name: Mint ephemeral OIDC test identity (keypair + JWKS + tokens)
        run: |
          python deploy/acceptance/gen_test_identity.py \
            --jwks-out "$RUNNER_TEMP/jwks.json" \
            --issuer "$A2A_TEST_ISSUER" \
            --audience "$A2A_TEST_AUDIENCE" \
            --allowlisted-sub FuzeSales \
            --unauth-sub FuzeStranger >> "$GITHUB_ENV"

      - name: Start JWKS endpoint
        run: |
          nohup python deploy/acceptance/jwks_server.py \
            --jwks "$RUNNER_TEMP/jwks.json" --host 127.0.0.1 --port 9099 \
            > "$RUNNER_TEMP/jwks.log" 2>&1 &
          for i in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:9099/healthz >/dev/null 2>&1; then
              echo "jwks up"; break
            fi
            sleep 0.5
          done
          curl -fsS http://127.0.0.1:9099/healthz || { echo "::error::JWKS server never came up"; cat "$RUNNER_TEMP/jwks.log"; exit 1; }

      - name: Map the card's in-cluster interface host to loopback
        run: |
          echo "127.0.0.1 ${A2A_SERVER_HOST}" | sudo tee -a /etc/hosts

      - name: Start the shared A2A server (echo provider, FuzePlan tenant)
        env:
          PYTHONPATH: ${{ github.workspace }}/agent-templates
          A2A_VALUES_FILE: ${{ github.workspace }}/deploy/acceptance/values.acceptance.json
          A2A_REPOS_DIR: ${{ runner.temp }}/repos
          AGENT_PROVIDER: echo
          HOST: 0.0.0.0
        run: |
          nohup python -m a2a.runtime > "$RUNNER_TEMP/a2a.log" 2>&1 &
          BASE="http://${A2A_SERVER_HOST}:${A2A_SERVER_PORT}"
          for i in $(seq 1 60); do
            if curl -fsS "$BASE/healthz" >/dev/null 2>&1; then
              echo "a2a up"; break
            fi
            sleep 0.5
          done
          curl -fsS "$BASE/healthz" || { echo "::error::A2A server never came up"; cat "$RUNNER_TEMP/a2a.log"; exit 1; }
          # Export the reachable base URL for the suite.
          echo "A2A_SERVER_BASE_URL=$BASE" >> "$GITHUB_ENV"

      - name: Preflight — acceptance requires a reachable server
        run: |
          if [ -z "${A2A_SERVER_BASE_URL}" ]; then
            echo "::error::Phase-3 acceptance gate: no A2A server configured/reachable."
            exit 1
          fi
          echo "Driving the live tier against ${A2A_SERVER_BASE_URL}"

      # The live tier, minus the ONE test that genuinely needs a real external product
      # agent. `test_caller_with_no_jira_skill_gets_tickets` asserts that FuzePlan
      # RETURNS created Jira tickets as task artifacts — that requires (a) a real
      # FuzePlan agent holding real Atlassian credentials (there is no Jira in CI) and
      # (b) an artifact channel from the provider result through the adapter that the
      # frozen adapter does not (yet) wire. It is a STAGING gate, not pure CI, and is
      # deselected here on purpose (NOT masked, NOT continue-on-error) and tracked in
      # #90. Everything else — conformance, authZ-negative, the full state machine,
      # and the other cross-product acceptance checks — runs and MUST pass.
      - name: Run live acceptance gate (conformance + authZ-negative + state-machine + cross-product)
        working-directory: tests/a2a
        run: |
          python -m pytest -m live -v \
            --deselect test_live_cross_product_acceptance.py::test_caller_with_no_jira_skill_gets_tickets

      - name: Server logs (always)
        if: always()
        run: |
          echo "=== a2a.log ==="; cat "$RUNNER_TEMP/a2a.log" 2>/dev/null || true
          echo "=== jwks.log ==="; cat "$RUNNER_TEMP/jwks.log" 2>/dev/null || true
