<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuzeAgent - AI Team Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .agent-card {
            transition: transform 0.2s ease-in-out;
        }
        .agent-card:hover {
            transform: translateY(-2px);
        }
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Header -->
    <nav class="bg-white shadow-lg border-b">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <h1 class="text-2xl font-bold text-blue-600">🤖 FuzeAgent</h1>
                    <span class="ml-2 text-sm text-gray-500">AI Team Manager</span>
                </div>
                <div class="flex space-x-4 items-center">
                    <button id="refreshBtn" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">
                        🔄 Refresh
                    </button>
                    <button id="createAgentBtn" class="px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700">
                        ➕ Create Agent
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto py-6 px-4">
        <!-- Statistics -->
        <div id="stats" class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <!-- Stats will be populated by JavaScript -->
        </div>

        <!-- Agents Grid -->
        <div class="bg-white rounded-lg shadow mb-6">
            <div class="p-6 border-b border-gray-200">
                <h2 class="text-xl font-semibold">AI Agents</h2>
                <p class="text-gray-600 mt-1">Manage your AI team members</p>
            </div>
            <div class="p-6">
                <div id="agentsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div class="text-center py-12">
                        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto"></div>
                        <p class="mt-4 text-gray-500">Loading agents...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tasks Section -->
        <div class="bg-white rounded-lg shadow">
            <div class="p-6 border-b border-gray-200">
                <h2 class="text-xl font-semibold">Recent Tasks</h2>
                <p class="text-gray-600 mt-1">Track task assignments and progress</p>
            </div>
            <div class="p-6">
                <div id="tasksGrid">
                    <p class="text-gray-500 text-center py-8">No tasks assigned yet. Create tasks for your agents!</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Create Agent Modal -->
    <div id="createAgentModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg p-6 w-full max-w-lg mx-4">
            <h3 class="text-lg font-semibold mb-4">Create New Agent</h3>
            
            <!-- Template Selection Tab -->
            <div class="mb-4">
                <div class="flex space-x-1 bg-gray-100 p-1 rounded-lg">
                    <button type="button" id="templateTab" class="flex-1 py-2 px-4 rounded-md bg-white text-blue-600 font-medium shadow-sm">
                        📄 From Template
                    </button>
                    <button type="button" id="customTab" class="flex-1 py-2 px-4 rounded-md text-gray-600 hover:text-gray-800">
                        ⚙️ Custom
                    </button>
                </div>
            </div>

            <!-- Template Form -->
            <form id="templateAgentForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Agent Template</label>
                    <select id="agentTemplate" class="w-full border border-gray-300 rounded-md px-3 py-2" required>
                        <option value="">Select a template...</option>
                    </select>
                </div>
                <div id="templateDescription" class="text-sm text-gray-600 bg-gray-50 p-3 rounded-md hidden">
                    <!-- Template description will be populated here -->
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Agent Name</label>
                    <input type="text" id="templateAgentName" class="w-full border border-gray-300 rounded-md px-3 py-2" placeholder="Will be auto-filled from template" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Goal (Optional)</label>
                    <textarea id="templateAgentGoal" class="w-full border border-gray-300 rounded-md px-3 py-2 h-20" placeholder="Leave empty to use template default"></textarea>
                </div>
                <div class="flex space-x-3 pt-4">
                    <button type="submit" class="flex-1 bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700">
                        Create from Template
                    </button>
                    <button type="button" id="cancelTemplateCreate" class="flex-1 bg-gray-300 text-gray-700 py-2 rounded-md hover:bg-gray-400">
                        Cancel
                    </button>
                </div>
            </form>
            
            <!-- Custom Form -->
            <form id="customAgentForm" class="space-y-4 hidden">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Agent Name</label>
                    <input type="text" id="customAgentName" class="w-full border border-gray-300 rounded-md px-3 py-2" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Role</label>
                    <input type="text" id="customAgentRole" class="w-full border border-gray-300 rounded-md px-3 py-2" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Type</label>
                    <select id="customAgentType" class="w-full border border-gray-300 rounded-md px-3 py-2">
                        <option value="developer">Developer</option>
                        <option value="executive">Executive</option>
                        <option value="qa">QA Engineer</option>
                        <option value="designer">Designer</option>
                    </select>
                </div>
                <div class="flex space-x-3 pt-4">
                    <button type="submit" class="flex-1 bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700">
                        Create Custom Agent
                    </button>
                    <button type="button" id="cancelCustomCreate" class="flex-1 bg-gray-300 text-gray-700 py-2 rounded-md hover:bg-gray-400">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Assign Task Modal -->
    <div id="assignTaskModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg p-6 w-full max-w-md mx-4">
            <h3 class="text-lg font-semibold mb-4">Assign Task</h3>
            <form id="assignTaskForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Task Title</label>
                    <input type="text" id="taskTitle" class="w-full border border-gray-300 rounded-md px-3 py-2" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                    <textarea id="taskDescription" class="w-full border border-gray-300 rounded-md px-3 py-2 h-24" required></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Task Type</label>
                    <select id="taskType" class="w-full border border-gray-300 rounded-md px-3 py-2">
                        <option value="implement_feature">Implement Feature</option>
                        <option value="fix_bug">Fix Bug</option>
                        <option value="code_review">Code Review</option>
                        <option value="refactor_code">Refactor Code</option>
                    </select>
                </div>
                <div class="flex space-x-3 pt-4">
                    <button type="submit" class="flex-1 bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700">
                        Assign Task
                    </button>
                    <button type="button" id="cancelTask" class="flex-1 bg-gray-300 text-gray-700 py-2 rounded-md hover:bg-gray-400">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let agents = [];
        let tasks = [];
        let templates = [];
        let selectedAgentId = null;

        // API Base URL
        const API_BASE = 'http://localhost:8000';

        // DOM Elements
        const agentsGrid = document.getElementById('agentsGrid');
        const tasksGrid = document.getElementById('tasksGrid');
        const statsContainer = document.getElementById('stats');
        const refreshBtn = document.getElementById('refreshBtn');
        const createAgentBtn = document.getElementById('createAgentBtn');
        const createAgentModal = document.getElementById('createAgentModal');
        const assignTaskModal = document.getElementById('assignTaskModal');

        // Event Listeners
        refreshBtn.addEventListener('click', loadData);
        createAgentBtn.addEventListener('click', () => {
            showModal('createAgentModal');
            loadTemplates();
        });
        document.getElementById('cancelTemplateCreate').addEventListener('click', () => hideModal('createAgentModal'));
        document.getElementById('cancelCustomCreate').addEventListener('click', () => hideModal('createAgentModal'));
        document.getElementById('cancelTask').addEventListener('click', () => hideModal('assignTaskModal'));
        document.getElementById('templateAgentForm').addEventListener('submit', createAgentFromTemplate);
        document.getElementById('customAgentForm').addEventListener('submit', createCustomAgent);
        document.getElementById('assignTaskForm').addEventListener('submit', assignTask);
        
        // Tab switching
        document.getElementById('templateTab').addEventListener('click', () => switchTab('template'));
        document.getElementById('customTab').addEventListener('click', () => switchTab('custom'));
        
        // Template selection
        document.getElementById('agentTemplate').addEventListener('change', updateTemplateInfo);

        // Utility Functions
        function showModal(modalId) {
            document.getElementById(modalId).classList.remove('hidden');
            document.getElementById(modalId).classList.add('flex');
        }

        function hideModal(modalId) {
            document.getElementById(modalId).classList.add('hidden');
            document.getElementById(modalId).classList.remove('flex');
        }

        function getStatusColor(status) {
            switch(status.toLowerCase()) {
                case 'active': return 'bg-green-100 text-green-800';
                case 'busy': return 'bg-yellow-100 text-yellow-800';
                case 'inactive': return 'bg-gray-100 text-gray-800';
                case 'error': return 'bg-red-100 text-red-800';
                default: return 'bg-gray-100 text-gray-800';
            }
        }

        function getTypeColor(type) {
            switch(type.toLowerCase()) {
                case 'executive': return 'bg-blue-100 text-blue-800';
                case 'developer': return 'bg-green-100 text-green-800';
                case 'qa': return 'bg-yellow-100 text-yellow-800';
                case 'designer': return 'bg-purple-100 text-purple-800';
                default: return 'bg-gray-100 text-gray-800';
            }
        }

        // Load Data
        async function loadData() {
            try {
                const [agentsResponse, tasksResponse] = await Promise.all([
                    fetch(`${API_BASE}/agents`),
                    fetch(`${API_BASE}/tasks`)
                ]);

                agents = await agentsResponse.json();
                tasks = await tasksResponse.json();

                renderStats();
                renderAgents();
                renderTasks();
            } catch (error) {
                console.error('Error loading data:', error);
                agentsGrid.innerHTML = '<p class="text-red-500 text-center py-8">Error loading data. Please check if the API is running.</p>';
            }
        }
        
        // Load Templates
        async function loadTemplates() {
            try {
                const response = await fetch(`${API_BASE}/templates`);
                const data = await response.json();
                templates = data.templates;
                populateTemplateDropdown();
            } catch (error) {
                console.error('Error loading templates:', error);
            }
        }

        // Render Functions
        function renderStats() {
            const activeAgents = agents.filter(a => a.status === 'active').length;
            const pendingTasks = tasks.filter(t => t.status === 'pending').length;
            const completedTasks = tasks.filter(t => t.status === 'completed').length;

            statsContainer.innerHTML = `
                <div class="bg-white p-6 rounded-lg shadow fade-in">
                    <div class="flex items-center">
                        <span class="text-2xl mr-3">🤖</span>
                        <div>
                            <p class="text-sm text-gray-600">Total Agents</p>
                            <p class="text-2xl font-semibold">${agents.length}</p>
                        </div>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-lg shadow fade-in">
                    <div class="flex items-center">
                        <span class="text-2xl mr-3">✅</span>
                        <div>
                            <p class="text-sm text-gray-600">Active Agents</p>
                            <p class="text-2xl font-semibold">${activeAgents}</p>
                        </div>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-lg shadow fade-in">
                    <div class="flex items-center">
                        <span class="text-2xl mr-3">⏳</span>
                        <div>
                            <p class="text-sm text-gray-600">Pending Tasks</p>
                            <p class="text-2xl font-semibold">${pendingTasks}</p>
                        </div>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-lg shadow fade-in">
                    <div class="flex items-center">
                        <span class="text-2xl mr-3">🎯</span>
                        <div>
                            <p class="text-sm text-gray-600">Completed Tasks</p>
                            <p class="text-2xl font-semibold">${completedTasks}</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderAgents() {
            if (agents.length === 0) {
                agentsGrid.innerHTML = '<p class="text-gray-500 text-center py-8">No agents found. Create your first agent!</p>';
                return;
            }

            agentsGrid.innerHTML = agents.map(agent => `
                <div class="agent-card border rounded-lg p-4 cursor-pointer hover:shadow-md transition-all fade-in"
                     onclick="selectAgent('${agent.id}')">
                    <div class="flex justify-between items-start mb-3">
                        <h3 class="font-semibold text-lg">${agent.name}</h3>
                        <span class="px-2 py-1 rounded text-xs font-medium ${getStatusColor(agent.status)}">
                            ${agent.status}
                        </span>
                    </div>
                    <p class="text-gray-600 text-sm mb-2">${agent.role}</p>
                    <div class="flex justify-between items-center mb-3">
                        <span class="px-2 py-1 rounded text-xs font-medium ${getTypeColor(agent.type)}">
                            ${agent.type}
                        </span>
                        <span class="text-xs text-gray-500">
                            ${tasks.filter(t => t.assigned_to === agent.id).length} tasks
                        </span>
                    </div>
                    <button onclick="event.stopPropagation(); assignTaskToAgent('${agent.id}')" 
                            class="w-full bg-blue-600 text-white py-2 px-4 rounded text-sm hover:bg-blue-700">
                        Assign Task
                    </button>
                </div>
            `).join('');
        }

        function renderTasks() {
            if (tasks.length === 0) {
                tasksGrid.innerHTML = '<p class="text-gray-500 text-center py-8">No tasks assigned yet. Create tasks for your agents!</p>';
                return;
            }

            tasksGrid.innerHTML = `
                <div class="overflow-x-auto">
                    <table class="min-w-full">
                        <thead>
                            <tr class="border-b border-gray-200">
                                <th class="text-left py-3 px-4 font-medium text-gray-900">Task</th>
                                <th class="text-left py-3 px-4 font-medium text-gray-900">Status</th>
                                <th class="text-left py-3 px-4 font-medium text-gray-900">Assigned To</th>
                                <th class="text-left py-3 px-4 font-medium text-gray-900">Created</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${tasks.map(task => `
                                <tr class="border-b border-gray-100 hover:bg-gray-50">
                                    <td class="py-4 px-4">
                                        <div>
                                            <p class="font-medium text-gray-900">${task.title}</p>
                                            <p class="text-sm text-gray-600 max-w-md truncate">${task.description}</p>
                                        </div>
                                    </td>
                                    <td class="py-4 px-4">
                                        <span class="px-2 py-1 rounded text-xs font-medium ${getStatusColor(task.status)}">
                                            ${task.status}
                                        </span>
                                    </td>
                                    <td class="py-4 px-4">
                                        <span class="font-medium text-gray-900">${task.assigned_agent_name || 'Unknown'}</span>
                                    </td>
                                    <td class="py-4 px-4 text-sm text-gray-600">
                                        ${new Date(task.created_at).toLocaleDateString()}
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        // Action Functions
        function selectAgent(agentId) {
            selectedAgentId = agentId;
            console.log('Selected agent:', agentId);
        }

        function assignTaskToAgent(agentId) {
            selectedAgentId = agentId;
            showModal('assignTaskModal');
        }

        // Tab Management
        function switchTab(tab) {
            const templateTab = document.getElementById('templateTab');
            const customTab = document.getElementById('customTab');
            const templateForm = document.getElementById('templateAgentForm');
            const customForm = document.getElementById('customAgentForm');
            
            if (tab === 'template') {
                templateTab.className = 'flex-1 py-2 px-4 rounded-md bg-white text-blue-600 font-medium shadow-sm';
                customTab.className = 'flex-1 py-2 px-4 rounded-md text-gray-600 hover:text-gray-800';
                templateForm.classList.remove('hidden');
                customForm.classList.add('hidden');
            } else {
                customTab.className = 'flex-1 py-2 px-4 rounded-md bg-white text-blue-600 font-medium shadow-sm';
                templateTab.className = 'flex-1 py-2 px-4 rounded-md text-gray-600 hover:text-gray-800';
                customForm.classList.remove('hidden');
                templateForm.classList.add('hidden');
            }
        }
        
        // Template Management
        function populateTemplateDropdown() {
            const select = document.getElementById('agentTemplate');
            select.innerHTML = '<option value="">Select a template...</option>';
            
            // Group templates by category
            const groupedTemplates = templates.reduce((groups, template) => {
                const category = template.category;
                if (!groups[category]) groups[category] = [];
                groups[category].push(template);
                return groups;
            }, {});
            
            // Add options grouped by category
            Object.entries(groupedTemplates).forEach(([category, categoryTemplates]) => {
                const optgroup = document.createElement('optgroup');
                optgroup.label = category.replace('_', ' ').toUpperCase();
                
                categoryTemplates.forEach(template => {
                    const option = document.createElement('option');
                    option.value = template.template_id;
                    option.textContent = template.name;
                    optgroup.appendChild(option);
                });
                
                select.appendChild(optgroup);
            });
        }
        
        function updateTemplateInfo() {
            const templateId = document.getElementById('agentTemplate').value;
            const descriptionDiv = document.getElementById('templateDescription');
            const nameInput = document.getElementById('templateAgentName');
            
            if (!templateId) {
                descriptionDiv.classList.add('hidden');
                nameInput.value = '';
                return;
            }
            
            const template = templates.find(t => t.template_id === templateId);
            if (template) {
                descriptionDiv.innerHTML = `
                    <div class="mb-2">
                        <strong>Description:</strong> ${template.description}
                    </div>
                    <div class="text-xs text-gray-500">
                        <strong>Category:</strong> ${template.category.replace('_', ' ').toUpperCase()} |
                        <strong>Tools:</strong> ${template.tools.join(', ')}
                    </div>
                `;
                descriptionDiv.classList.remove('hidden');
                nameInput.value = `${template.name} Agent`;
            }
        }
        
        async function createAgentFromTemplate(e) {
            e.preventDefault();
            
            const templateId = document.getElementById('agentTemplate').value;
            const name = document.getElementById('templateAgentName').value;
            const goal = document.getElementById('templateAgentGoal').value;
            
            if (!templateId) {
                alert('Please select a template');
                return;
            }
            
            const requestData = {
                template_id: templateId,
                overrides: {
                    name: name
                }
            };
            
            if (goal.trim()) {
                requestData.overrides.goal = goal;
            }

            try {
                const response = await fetch(`${API_BASE}/agents/from-template`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestData)
                });

                if (response.ok) {
                    hideModal('createAgentModal');
                    document.getElementById('templateAgentForm').reset();
                    document.getElementById('templateDescription').classList.add('hidden');
                    await loadData();
                } else {
                    const error = await response.json();
                    alert('Error creating agent: ' + (error.detail || 'Unknown error'));
                }
            } catch (error) {
                console.error('Error creating agent from template:', error);
                alert('Error creating agent from template');
            }
        }
        
        async function createCustomAgent(e) {
            e.preventDefault();
            
            const agentData = {
                name: document.getElementById('customAgentName').value,
                role: document.getElementById('customAgentRole').value,
                type: document.getElementById('customAgentType').value,
                config: {
                    goal: `Perform ${document.getElementById('customAgentRole').value} tasks efficiently`,
                    tools: ["code_generation", "code_review"],
                    model: "claude-sonnet-4-20250514",
                    temperature: 0.7
                }
            };

            try {
                const response = await fetch(`${API_BASE}/agents`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(agentData)
                });

                if (response.ok) {
                    hideModal('createAgentModal');
                    document.getElementById('customAgentForm').reset();
                    await loadData();
                } else {
                    alert('Error creating custom agent');
                }
            } catch (error) {
                console.error('Error creating custom agent:', error);
                alert('Error creating custom agent');
            }
        }

        async function assignTask(e) {
            e.preventDefault();
            
            if (!selectedAgentId) {
                alert('Please select an agent first');
                return;
            }

            const taskData = {
                title: document.getElementById('taskTitle').value,
                description: document.getElementById('taskDescription').value,
                type: document.getElementById('taskType').value
            };

            try {
                const response = await fetch(`${API_BASE}/agents/${selectedAgentId}/tasks`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(taskData)
                });

                if (response.ok) {
                    hideModal('assignTaskModal');
                    document.getElementById('assignTaskForm').reset();
                    await loadData();
                } else {
                    alert('Error assigning task');
                }
            } catch (error) {
                console.error('Error assigning task:', error);
                alert('Error assigning task');
            }
        }

        // Initialize
        loadData();
        
        // Auto-refresh every 10 seconds
        setInterval(loadData, 10000);
    </script>
</body>
</html>
